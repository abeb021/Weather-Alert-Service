services:
  api-gateway:
    build:
       context: ../api-gateway
    ports:
      - "80:80"
    networks:
      - weather-network
    depends_on:
      - auth-service
      #- weather-service
      #- alert-service
      #- notification-service
    restart: unless-stopped 

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    expose:
      - "8001"
    env_file:
      - ../.env
    environment:
      USER_DB_URL: "postgres://postgres:postgres@auth-db:5432/auth?sslmode=disable"
      TOKEN_DB_URL: "postgres://postgres:postgres@auth-db:5432/auth?sslmode=disable"
      MIGRATIONS_DB_URL: "postgres://postgres:postgres@auth-db:5432/auth?sslmode=disable"
    networks:
      - weather-network
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - 5432
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - weather-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped


networks:
  weather-network:
    driver: bridge

volumes:
  auth-db-data:
